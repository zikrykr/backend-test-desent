version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-test-desent-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - APP_ENV=development
      - APP_HOST=0.0.0.0
    env_file:
      - .env
    restart: unless-stopped
